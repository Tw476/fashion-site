<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sodiq Fashion</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

    body { background:#fff; color:#111; }

    header {
      text-align:center;
      padding:60px 20px;
      background:#000;
      color:#fff;
    }

    header h1 { font-size:2.5rem; }

    header p { color:#ccc; margin-top:10px; }

    .btn {
      display:inline-block;
      margin-top:20px;
      padding:12px 25px;
      background:#25D366;
      color:#000;
      text-decoration:none;
      border-radius:25px;
      font-weight:bold;
    }

    .section { padding:50px 20px; text-align:center; }

    .products {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
      gap:20px;
      max-width:1000px;
      margin:auto;
    }

    .card {
      border:1px solid #ddd;
      border-radius:10px;
      overflow:hidden;
    }

    .card img {
      width:100%;
      height:250px;
      object-fit:cover;
    }

    .card h3 { margin:10px; }

    .price { color:#555; margin-bottom:10px; }

    footer {
      text-align:center;
      padding:20px;
      background:#000;
      color:#aaa;
    }
  </style>
</head>
<body>

<header>
  <h1>Sodiq Fashion</h1>
  <p>Premium styles. Simple ordering.</p>
  <a class="btn" href="https://wa.me/2348104486235">Order on WhatsApp</a>
</header>

<section class="section">
  <h2>Our Collection</h2>

  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38?w=500">
      <h3>Casual Outfit</h3>
      <p class="price">₦12,000</p>
      <a class="btn" href="https://wa.me/2348104486235">Order</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=500">
      <h3>Street Wear</h3>
      <p class="price">₦15,000</p>
      <a class="btn" href="https://wa.me/2348104486235">Order</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500">
      <h3>Stylish Sneakers</h3>
      <p class="price">₦18,000</p>
      <a class="btn" href="https://wa.me/2348104486235">Order</a>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 Sodiq Fashion</p>
</footer>

</body>
</html>
